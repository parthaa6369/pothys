apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: staging
spec:
  type: NodePort
  selector:
    app: analytics-service
  ports:
    - port: 80          # Service port
      targetPort: 3000  # Container port (your NestJS app)
      nodePort: 32081   # Pick a free port in 30000–32767 range
