# Common microservice template for dev
x-microservice-template: &microservice-template
  depends_on:
    # mysql:
    #   condition: service_healthy
    phpmyadmin:
      condition: service_started
  env_file:
    - .env
  environment:
    - NODE_ENV=development
    - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
    - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    - CHROMIUM_PATH=/usr/bin/chromium-browser
  build:
    context: .
    target: dev
  volumes:
    - ./libs:/app/libs
    - ./tsconfig.base.json:/app/tsconfig.base.json
    - ./package.json:/app/package.json
    - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
    - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
    # - ./node_modules:/app/node_modules

services:
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    # No depends_on needed since connecting to remote DB
    environment:
      PMA_HOST: ${DB_HOST}
      PMA_PORT: 3306
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASS}
      PMA_ARBITRARY: 1
    ports:
      - '8080:80'

  identity-service:
    <<: *microservice-template
    build:
      context: .
      dockerfile: microservices/identity-service/Dockerfile
      target: dev
    container_name: identity-service-dev
    working_dir: /app/microservices/identity-service
    volumes:
      - ./microservices/identity-service:/app/microservices/identity-service
      - ./libs:/app/libs
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./node_modules:/app/node_modules
    ports:
      - '3001:3000' # HTTP API

